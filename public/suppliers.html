<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Suppliers - WMS</title>
        <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
        <link href="assets/css/styles.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <script src="assets/js/layout.js"></script>
    </head>
    <body class="sb-nav-fixed">
        <div id="navbar-container"></div>
        <div id="layoutSidenav">
            <div id="sidebar-container"></div>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Suppliers</h1>

                        <div class="d-flex justify-content-end mb-3">
                            <button
                                class="btn btn-primary"
                                data-bs-toggle="modal"
                                data-bs-target="#supplierModal"
                                onclick="clearSupplierForm()">
                                <i class="fas fa-plus"></i>
                                Add Supplier
                            </button>
                        </div>

                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-truck me-1"></i>
                                Supplier List
                            </div>
                            <div class="card-body">
                                <table id="suppliersTable" class="table table-bordered table-striped">
                                    <thead>
                                        <tr>
                                            <th>Code</th>
                                            <th>Name</th>
                                            <th>Contact</th>
                                            <th>Phone</th>
                                            <th>Email</th>
                                            <th width="120">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="supplierTableBody">
                                        <tr>
                                            <td colspan="6" class="text-center">Loading...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
                <div id="footer-container"></div>
            </div>
        </div>

        <!-- Supplier Modal -->
        <div class="modal fade" id="supplierModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Add Supplier</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label>Code</label>
                                <input type="text" id="code" class="form-control" placeholder="Supplier code">
                            </div>

                            <div class="col-md-8 mb-3">
                                <label>Name <span class="text-danger">*</span></label>
                                <input type="text" id="name" class="form-control" placeholder="Supplier name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Contact Name</label>
                                <input type="text" id="contact_name" class="form-control" placeholder="Contact person">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Phone</label>
                                <input type="text" id="phone" class="form-control" placeholder="Phone number">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Email</label>
                                <input type="text" id="email" class="form-control" placeholder="Email address">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Remark</label>
                                <input type="text" id="remark" class="form-control" placeholder="Remark">
                            </div>

                            <div class="col-md-12 mb-3">
                                <label>Address</label>
                                <textarea id="address" class="form-control" rows="2" placeholder="Address"></textarea>
                            </div>

                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="saveSupplier()">
                            Save Supplier
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="assets/js/suppliers.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="assets/js/scripts.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
    </body>
</html>
