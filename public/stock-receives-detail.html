<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Receive Detail - WMS</title>
        <link href="assets/css/styles.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <script src="assets/js/layout.js"></script>
    </head>
    <body class="sb-nav-fixed">
        <div id="navbar-container"></div>
        <div id="layoutSidenav">
            <div id="sidebar-container"></div>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">

                        <div class="d-flex align-items-center mt-4 mb-3">
                            <a href="stock-receives.html" class="btn btn-secondary btn-sm me-3">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                            <h1 class="mb-0">Receive Detail</h1>
                        </div>

                        <!-- Header Info -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-file-alt me-1"></i>
                                Receive Information
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label class="text-muted small">Receive No.</label>
                                        <div class="fw-bold" id="receive_no">-</div>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label class="text-muted small">Date</label>
                                        <div class="fw-bold" id="receive_date">-</div>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label class="text-muted small">Supplier</label>
                                        <div class="fw-bold" id="supplier_name">-</div>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label class="text-muted small">Created By</label>
                                        <div class="fw-bold" id="created_by">-</div>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="text-muted small">Remark</label>
                                        <div id="remark">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Detail Items -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-list me-1"></i>
                                Items
                            </div>
                            <div class="card-body">
                                <table class="table table-bordered table-striped">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Code</th>
                                            <th>Product</th>
                                            <th>Unit</th>
                                            <th class="text-end">Qty</th>
                                            <th class="text-end">Cost Price</th>
                                            <th class="text-end">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody id="detailTableBody">
                                        <tr>
                                            <td colspan="7" class="text-center">Loading...</td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr class="table-light fw-bold">
                                            <td colspan="4" class="text-end">Grand Total</td>
                                            <td class="text-end" id="total_qty">0</td>
                                            <td></td>
                                            <td class="text-end" id="grand_total">0.00</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>

                    </div>
                </main>
                <div id="footer-container"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="assets/js/stock-receive-detail.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="assets/js/scripts.js"></script>
    </body>
</html>
