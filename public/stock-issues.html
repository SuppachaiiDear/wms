<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Stock Issue - WMS</title>
        <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
        <link href="assets/css/styles.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <script src="assets/js/layout.js"></script>
    </head>
    <body class="sb-nav-fixed">
        <div id="navbar-container"></div>
        <div id="layoutSidenav">
            <div id="sidebar-container"></div>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Stock Issue</h1>

                        <div class="d-flex justify-content-end mb-3">
                            <button
                                class="btn btn-primary"
                                data-bs-toggle="modal"
                                data-bs-target="#issueModal"
                                onclick="clearIssueForm()">
                                <i class="fas fa-plus"></i>
                                New Issue
                            </button>
                        </div>

                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-arrow-up me-1"></i>
                                Stock Issue List
                            </div>
                            <div class="card-body">
                                <table id="issueTable" class="table table-bordered table-striped">
                                    <thead>
                                        <tr>
                                            <th>Issue No.</th>
                                            <th>Date</th>
                                            <th>Farm</th>
                                            <th>Requester</th>
                                            <th>Remark</th>
                                            <th width="80">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="issueTableBody">
                                        <tr>
                                            <td colspan="6" class="text-center">Loading...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
                <div id="footer-container"></div>
            </div>
        </div>

        <!-- Issue Modal -->
        <div class="modal fade" id="issueModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">New Stock Issue</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <!-- Header Fields -->
                        <div class="row mb-3">
                            <div class="col-md-4 mb-3">
                                <label>Issue No.</label>
                                <input type="text" id="issue_no" class="form-control">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Farm</label>
                                <input type="text" id="farm_name" class="form-control" placeholder="Farm name">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Requester</label>
                                <input type="text" id="requester_name" class="form-control" placeholder="Requester name">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label>Remark</label>
                                <input type="text" id="remark" class="form-control" placeholder="Remark">
                            </div>
                        </div>

                        <hr>

                        <!-- Add Item -->
                        <div class="row align-items-end mb-3">
                            <div class="col-md-5 mb-2">
                                <label>Product</label>
                                <select id="product_id" class="form-select">
                                    <option value="">Select Product</option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>Stock</label>
                                <input type="text" id="available_stock" class="form-control" readonly>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>Qty</label>
                                <input type="number" id="qty" class="form-control" min="1">
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>Cost Price</label>
                                <input type="number" id="cost_price" class="form-control" readonly>
                            </div>
                            <div class="col-md-1 mb-2">
                                <button class="btn btn-success w-100" onclick="addIssueItem()">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Items Table -->
                        <table class="table table-bordered table-sm">
                            <thead class="table-light">
                                <tr>
                                    <th>Product</th>
                                    <th class="text-end">Qty</th>
                                    <th class="text-end">Cost Price</th>
                                    <th class="text-end">Total</th>
                                    <th width="60"></th>
                                </tr>
                            </thead>
                            <tbody id="issueItemsTable">
                                <tr id="emptyRow">
                                    <td colspan="5" class="text-center text-muted">No items added</td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr class="table-light fw-bold">
                                    <td colspan="3" class="text-end">Grand Total</td>
                                    <td class="text-end" id="modal_grand_total">0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="saveIssue()">
                            <i class="fas fa-save"></i> Save Issue
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="assets/js/stock-issues.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="assets/js/scripts.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
    </body>
</html>
